<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Galerie | Alenka-Club</title>
  <style>
    /* ZÁKLADNÍ STYLING PRO GRID */
    body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
    h1 { text-align: center; color: #ff007f; }
    .skryty { display: none !important; }
    
    /* Mřížka pro přehled i fotky */
    .galerie-grid, .foto-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    /* Vzhled karty eventu */
    .karta-eventu {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      padding: 15px;
      text-align: center;
      transition: transform 0.2s;
    }
    .karta-eventu:hover { transform: translateY(-5px); }
    .karta-nahled { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; }
    .karta-nazev { margin: 15px 0; font-size: 1.2rem; }
    .karta-tlacitko { background: #ff007f; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
    
    /* Vzhled samotné fotky v detailu */
    .foto-polozka img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid #333;
    }
    #zpet-na-prehled { background: #333; color: white; border: none; padding: 10px 15px; cursor: pointer; margin-bottom: 20px; }
  </style>
</head>
<body>

  <h1>Alenka-Club Galerie</h1>

  <div id="sekce-prehled">
    <div id="prehled-galerii" class="galerie-grid"></div>
  </div>

  <div id="sekce-detail" class="skryty">
    <button id="zpet-na-prehled">← Zpět na přehled</button>
    <h2 id="nazev-aktualni-galerie"></h2>
    <div id="foto-grid" class="foto-grid"></div>
  </div>

  <template id="sablona-karty">
    <div class="karta-eventu">
      <img src="" alt="" class="karta-nahled">
      <h3 class="karta-nazev"></h3>
      <button class="karta-tlacitko">Otevřít galerii</button>
    </div>
  </template>

  <template id="sablona-fotky">
    <div class="foto-polozka">
      <img src="" alt="Fotka z akce">
    </div>
  </template>

  <script>
    // 1. Ručně definovaná testovací data (zatím nahrazují databázi/API)
    const dataGalerii = [
      {
        id: 'halloween',
        nazev: 'Halloween 2023',
        nahled: 'Galery/Halloween 2023/images.jpg',
        fotky: [
          'Galery/Halloween 2023/images.jpg',
          'Galery/Halloween 2023/images (1).jpg'
        ]
      },
      {
        id: 'leto',
        nazev: 'Láto 2026',
        nahled: 'Galery/leto2026/images.jpg',
        fotky: [
          'Galery/leto2026/images.jpg',
          'Galery/leto2026/images (2).jpg'
        ]
      }
    ];

    // Načtení důležitých prvků z HTML
    const prehledKontejner = document.getElementById('prehled-galerii');
    const sekcePrehled = document.getElementById('sekce-prehled');
    const sekceDetail = document.getElementById('sekce-detail');
    const fotoGrid = document.getElementById('foto-grid');
    const tlacitkoZpet = document.getElementById('zpet-na-prehled');

    // 2. FUNKCE: Vykreslení hlavního přehledu
    function vykresliPrehled() {
      const sablonaKarty = document.getElementById('sablona-karty');
      
      dataGalerii.forEach(event => {
        // Klonujeme šablonu karty
        const klon = sablonaKarty.content.cloneNode(true);
        
        // Naplníme ji daty
        klon.querySelector('.karta-nazev').textContent = event.nazev;
        klon.querySelector('.karta-nahled').src = event.nahled;
        klon.querySelector('.karta-nahled').alt = event.nazev;
        
        // Kliknutím otevřeme detail akce
        klon.querySelector('.karta-tlacitko').addEventListener('click', () => {
          zobrazDetail(event);
        });
        
        // Vhodíme ji do stránky
        prehledKontejner.appendChild(klon);
      });
    }

    // 3. FUNKCE: Zobrazení detailu galerie [cite: 26]
    function zobrazDetail(event) {
      // Prohodíme viditelnost sekcí [cite: 26]
      sekcePrehled.classList.add('skryty');
      sekceDetail.classList.remove('skryty');
      
      // Nastavíme nadpis
      document.getElementById('nazev-aktualni-galerie').textContent = event.nazev;
      
      // Vyčistíme staré fotky [cite: 26]
      fotoGrid.innerHTML = '';
      
      // Vykreslíme fotky pomocí druhé šablony
      const sablonaFotky = document.getElementById('sablona-fotky');
      event.fotky.forEach(cestaKFotce => {
        const klonFoto = sablonaFotky.content.cloneNode(true);
        klonFoto.querySelector('img').src = cestaKFotce;
        fotoGrid.appendChild(klonFoto);
      });
    }

    // 4. Tlačítko zpět
    tlacitkoZpet.addEventListener('click', () => {
      sekceDetail.classList.add('skryty');
      sekcePrehled.classList.remove('skryty');
    });

    // Spuštění kódu po načtení stránky
    vykresliPrehled();
  </script>
</body>
</html>
